<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=380">
<title>Job Hunting Assistant</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 380px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    color: #1a1a1a;
    background: #f5f6f8;
    padding: 16px;
  }
  h1 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 14px;
    color: #0a66c2;
  }
  section { margin-bottom: 14px; }
  .section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #666;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid #ddd;
  }
  .field {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
  }
  .field label {
    flex: 0 0 130px;
    font-size: 12px;
    color: #444;
  }
  .field input,
  .field select {
    flex: 1;
    padding: 5px 8px;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 12px;
    background: #fff;
  }
  .field input:focus,
  .field select:focus {
    outline: none;
    border-color: #0a66c2;
    box-shadow: 0 0 0 2px rgba(10,102,194,0.15);
  }
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  button {
    flex: 1;
    padding: 8px 0;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  #btn-scan {
    background: #0a66c2;
    color: #fff;
  }
  #btn-scan:hover:not(:disabled) { background: #004182; }
  #btn-scan:disabled { opacity: 0.5; cursor: not-allowed; }
  #btn-save {
    background: #e8e8e8;
    color: #333;
  }
  #btn-save:hover { background: #d4d4d4; }
  #btn-stop {
    background: #dc2626;
    color: #fff;
    display: none;
  }
  #btn-stop:hover { background: #b91c1c; }
  #status-area {
    margin-top: 12px;
    padding: 10px;
    background: #fff;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    font-size: 12px;
    color: #444;
    line-height: 1.5;
    min-height: 36px;
  }
  #status-area .live { color: #0a66c2; font-weight: 600; }
  #status-area .done { color: #057642; }
  #status-area .err  { color: #c00; }
  .toast {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    background: #057642;
    color: #fff;
    padding: 6px 18px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  #warning-banner {
    display: none;
    background: #fef3c7;
    border: 1px solid #f59e0b;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    color: #92400e;
    margin-bottom: 10px;
    line-height: 1.4;
  }
  #warning-banner button {
    flex: none;
    background: transparent;
    border: 1px solid #d97706;
    border-radius: 4px;
    color: #92400e;
    font-size: 11px;
    padding: 2px 8px;
    margin-left: 8px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h1>Job Hunting Assistant</h1>

<div id="warning-banner"><span id="warning-text"></span><button id="btn-clear-warning">Clear</button></div>

<!-- Settings -->
<section>
  <div class="section-title">Settings</div>
  <div class="field">
    <label for="backendUrl">Backend URL</label>
    <input id="backendUrl" type="text" value="http://localhost:8000">
  </div>
  <div class="field">
    <label for="authToken">Auth Token</label>
    <input id="authToken" type="text" value="dev-token">
  </div>
  <div class="field">
    <label for="scanDelay">Scan Delay</label>
    <select id="scanDelay">
      <option value="fast">Fast</option>
      <option value="normal" selected>Normal</option>
      <option value="slow">Slow</option>
    </select>
  </div>
</section>

<!-- Config -->
<section>
  <div class="section-title">Search Config</div>
  <div class="field">
    <label for="keyword">Keyword</label>
    <input id="keyword" type="text">
  </div>
  <div class="field">
    <label for="location">Location</label>
    <input id="location" type="text" value="Canada">
  </div>
  <div class="field">
    <label for="f_tpr_bound">Look-back hours (max)</label>
    <input id="f_tpr_bound" type="number" value="48">
  </div>
  <div class="field">
    <label for="f_experience">Experience Level</label>
    <input id="f_experience" type="text" placeholder="e.g. 2,3,4 or leave empty">
  </div>
  <div class="field">
    <label for="f_job_type">Job Type</label>
    <input id="f_job_type" type="text" placeholder="e.g. F,C or leave empty">
  </div>
  <div class="field">
    <label for="f_remote">Remote</label>
    <input id="f_remote" type="text" placeholder="e.g. 2,3 or leave empty">
  </div>
  <div class="field">
    <label for="salary_min">Min Salary (0 = no filter)</label>
    <input id="salary_min" type="number" value="0">
  </div>
</section>

<!-- Actions -->
<div class="btn-row">
  <button id="btn-save">Save Settings</button>
  <button id="btn-scan">Scan Now</button>
  <button id="btn-stop">Stop Scan</button>
</div>

<!-- Status -->
<div id="status-area">Ready</div>

<div id="toast" class="toast">Saved</div>

<script src="popup.js"></script>
</body>
</html>
