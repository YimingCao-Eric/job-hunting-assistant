services:
  backend:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    environment:
      - CONFIG_PATH=/app/data/config.json
      - PROFILE_PATH=/app/data/profile.json
      - REDIS_URL=redis://redis:6379/0
    volumes:
      # Persist profile + search config on the host (survives image rebuilds).
      # Create ./data before first up, or Docker will create it (may be root-owned on Linux).
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["5173:5173"]
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_AUTH_TOKEN=dev-token
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jha
      POSTGRES_PASSWORD: jha
      POSTGRES_DB: jha
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jha"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    restart: unless-stopped

volumes:
  postgres_data:
